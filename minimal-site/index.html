<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>MagicMakeup Minimal Results</title>
  <link rel="stylesheet" href="assets/css/site.css">
</head>
<body>
  <main class="page">
    <header class="page-head">
      <p class="eyebrow">MagicMakeup</p>
      <h1>Results</h1>
    </header>

    <section class="result-block" aria-labelledby="full-face-title">
      <h2 id="full-face-title">Full-Face Makeup</h2>
      <div class="paired-grid">
        <article class="paired-card" data-compare-tile>
          <figure class="paired-card__reference">
            <img src="assets/images/1-2.png" alt="Full-face makeup reference">
          </figure>
          <div class="compare-viewer" data-compare-viewer tabindex="0" role="slider" aria-valuemin="0" aria-valuemax="100" aria-valuenow="50" aria-label="Full-face makeup comparison split">
            <img src="assets/images/1-1.png" alt="Source face">
            <img class="compare-viewer__after" src="assets/images/1-3.png" alt="Full-face makeup result">
            <div class="compare-viewer__line" aria-hidden="true"></div>
            <span class="compare-viewer__handle" aria-hidden="true"></span>
          </div>
        </article>

        <article class="paired-card" data-compare-tile>
          <figure class="paired-card__reference">
            <img src="assets/images/2-2.png" alt="Full-face makeup reference">
          </figure>
          <div class="compare-viewer" data-compare-viewer tabindex="0" role="slider" aria-valuemin="0" aria-valuemax="100" aria-valuenow="50" aria-label="Full-face makeup comparison split">
            <img src="assets/images/2-1.png" alt="Source face">
            <img class="compare-viewer__after" src="assets/images/2-3.png" alt="Full-face makeup result">
            <div class="compare-viewer__line" aria-hidden="true"></div>
            <span class="compare-viewer__handle" aria-hidden="true"></span>
          </div>
        </article>

        <article class="paired-card" data-compare-tile>
          <figure class="paired-card__reference">
            <img src="assets/images/3-2.png" alt="Full-face makeup reference">
          </figure>
          <div class="compare-viewer" data-compare-viewer tabindex="0" role="slider" aria-valuemin="0" aria-valuemax="100" aria-valuenow="50" aria-label="Full-face makeup comparison split">
            <img src="assets/images/3-1.png" alt="Source face">
            <img class="compare-viewer__after" src="assets/images/3-3.png" alt="Full-face makeup result">
            <div class="compare-viewer__line" aria-hidden="true"></div>
            <span class="compare-viewer__handle" aria-hidden="true"></span>
          </div>
        </article>

        <article class="paired-card" data-compare-tile>
          <figure class="paired-card__reference">
            <img src="assets/images/4-2.png" alt="Full-face makeup reference">
          </figure>
          <div class="compare-viewer" data-compare-viewer tabindex="0" role="slider" aria-valuemin="0" aria-valuemax="100" aria-valuenow="50" aria-label="Full-face makeup comparison split">
            <img src="assets/images/4-1.png" alt="Source face">
            <img class="compare-viewer__after" src="assets/images/4-3.png" alt="Full-face makeup result">
            <div class="compare-viewer__line" aria-hidden="true"></div>
            <span class="compare-viewer__handle" aria-hidden="true"></span>
          </div>
        </article>

        <article class="paired-card" data-compare-tile>
          <figure class="paired-card__reference">
            <img src="assets/images/5_2.png" alt="Full-face makeup reference">
          </figure>
          <div class="compare-viewer" data-compare-viewer tabindex="0" role="slider" aria-valuemin="0" aria-valuemax="100" aria-valuenow="50" aria-label="Full-face makeup comparison split">
            <img src="assets/images/5_1.png" alt="Source face">
            <img class="compare-viewer__after" src="assets/images/5_3.png" alt="Full-face makeup result">
            <div class="compare-viewer__line" aria-hidden="true"></div>
            <span class="compare-viewer__handle" aria-hidden="true"></span>
          </div>
        </article>

        <article class="paired-card" data-compare-tile>
          <figure class="paired-card__reference">
            <img src="assets/images/6_2.png" alt="Full-face makeup reference">
          </figure>
          <div class="compare-viewer" data-compare-viewer tabindex="0" role="slider" aria-valuemin="0" aria-valuemax="100" aria-valuenow="50" aria-label="Full-face makeup comparison split">
            <img src="assets/images/6_1.png" alt="Source face">
            <img class="compare-viewer__after" src="assets/images/6_3.png" alt="Full-face makeup result">
            <div class="compare-viewer__line" aria-hidden="true"></div>
            <span class="compare-viewer__handle" aria-hidden="true"></span>
          </div>
        </article>
      </div>
    </section>

    <section class="result-block" aria-labelledby="regional-title">
      <h2 id="regional-title">Regional Transfer</h2>
      <div class="regional-grid">
        <article class="regional-card" data-regional-card>
          <div class="regional-card__refs">
            <h3>Reference</h3>
            <button class="regional-option is-active" type="button" data-regional-option data-output-src="assets/images/b1-3.png" aria-label="Regional reference option 1"><img src="assets/images/b1-2.png" alt=""></button>
            <button class="regional-option" type="button" data-regional-option data-output-src="assets/images/b1-5.png" aria-label="Regional reference option 2"><img src="assets/images/b1-4.png" alt=""></button>
          </div>
          <figure class="regional-card__output">
            <h3>Output</h3>
            <img data-regional-output src="assets/images/b1-1.png" alt="Regional transfer output">
          </figure>
        </article>

        <article class="regional-card" data-regional-card>
          <div class="regional-card__refs">
            <h3>Reference</h3>
            <button class="regional-option is-active" type="button" data-regional-option data-output-src="assets/images/c1-3.png" aria-label="Regional reference option 1"><img src="assets/images/c1-2.png" alt=""></button>
            <button class="regional-option" type="button" data-regional-option data-output-src="assets/images/c1-5.png" aria-label="Regional reference option 2"><img src="assets/images/c1-4.png" alt=""></button>
          </div>
          <figure class="regional-card__output">
            <h3>Output</h3>
            <img data-regional-output src="assets/images/c1-1.png" alt="Regional transfer output">
          </figure>
        </article>

        <article class="regional-card" data-regional-card>
          <div class="regional-card__refs">
            <h3>Reference</h3>
            <button class="regional-option is-active" type="button" data-regional-option data-output-src="assets/images/full-face-transfer.png" aria-label="Regional reference option 1"><img src="assets/images/challenges.png" alt=""></button>
            <button class="regional-option" type="button" data-regional-option data-output-src="assets/images/comparison.png" aria-label="Regional reference option 2"><img src="assets/images/data-pipeline.png" alt=""></button>
          </div>
          <figure class="regional-card__output">
            <h3>Output</h3>
            <img data-regional-output src="assets/images/full-face-transfer.png" alt="Regional transfer output">
          </figure>
        </article>

        <article class="regional-card" data-regional-card>
          <div class="regional-card__refs">
            <h3>Reference</h3>
            <button class="regional-option is-active" type="button" data-regional-option data-output-src="assets/images/teaser.png" aria-label="Regional reference option 1"><img src="assets/images/supp-comparison.png" alt=""></button>
            <button class="regional-option" type="button" data-regional-option data-output-src="assets/images/full-face-transfer.png" aria-label="Regional reference option 2"><img src="assets/images/ablation.png" alt=""></button>
          </div>
          <figure class="regional-card__output">
            <h3>Output</h3>
            <img data-regional-output src="assets/images/teaser.png" alt="Regional transfer output">
          </figure>
        </article>

        <article class="regional-card" data-regional-card>
          <div class="regional-card__refs">
            <h3>Reference</h3>
            <button class="regional-option is-active" type="button" data-regional-option data-output-src="assets/images/comparison.png" aria-label="Regional reference option 1"><img src="assets/images/data-pipeline.png" alt=""></button>
            <button class="regional-option" type="button" data-regional-option data-output-src="assets/images/supp-comparison.png" aria-label="Regional reference option 2"><img src="assets/images/full-face-transfer.png" alt=""></button>
          </div>
          <figure class="regional-card__output">
            <h3>Output</h3>
            <img data-regional-output src="assets/images/comparison.png" alt="Regional transfer output">
          </figure>
        </article>

        <article class="regional-card" data-regional-card>
          <div class="regional-card__refs">
            <h3>Reference</h3>
            <button class="regional-option is-active" type="button" data-regional-option data-output-src="assets/images/region-transfer.png" aria-label="Regional reference option 1"><img src="assets/images/teaser.png" alt=""></button>
            <button class="regional-option" type="button" data-regional-option data-output-src="assets/images/comparison.png" aria-label="Regional reference option 2"><img src="assets/images/ablation.png" alt=""></button>
          </div>
          <figure class="regional-card__output">
            <h3>Output</h3>
            <img data-regional-output src="assets/images/region-transfer.png" alt="Regional transfer output">
          </figure>
        </article>
      </div>
    </section>
  </main>

  <script src="assets/js/site.js"></script>
</body>
</html>
